<div class="otp-container">

    <nav class="navbar">
      <ul>
        <li><a routerLink="/user/info">User edit</a></li>
      </ul>
    </nav>

  <h2>Introduceți OTP-ul pentru autentificare 2FA</h2>

  <form [formGroup]="otpForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="otp">OTP:</label>
      <input type="text" id="otp" formControlName="otp" class="form-control" placeholder="Introduceți OTP-ul" />

    </div>

    <button type="submit" class="btn btn-primary" [disabled]="otpForm.invalid">Verifică OTP</button>
  </form>

  <div *ngIf="errorMessage" class="error-message">
    <p>{{ errorMessage }}</p>
  </div>
</div>
